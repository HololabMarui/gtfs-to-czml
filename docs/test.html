<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GTFS-JP Zip確認</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
      line-height: 1.6;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }
    p {
      color: #475569;
    }
    label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    input[type="file"] {
      display: block;
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      box-sizing: border-box;
    }
    .filename {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      color: #334155;
    }
    button {
      margin-top: 1.2rem;
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 0.75rem 1.1rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    .note {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>GTFS-JP Zip確認</h1>
      <p>
        まずは GTFS-JP の Zip をアップロードして、
        サーバ側で展開・必須ファイル確認を行います。
      </p>

      <form action="/inspect" method="post" enctype="multipart/form-data">
        <label for="gtfs_zip">GTFS-JP Zipファイル</label>
        <input
          type="file"
          id="gtfs_zip"
          name="gtfs_zip"
          accept=".zip"
          required
        >

        <div class="filename" id="filename">未選択</div>

        <button type="submit">Zipを確認する</button>
      </form>

      <div class="note">
        この段階ではまだ変換は行いません。Zipの受け取りと中身確認だけを行います。
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("gtfs_zip");
    const filename = document.getElementById("filename");

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        filename.textContent = "選択中: " + fileInput.files[0].name;
      } else {
        filename.textContent = "未選択";
      }
    });
  </script>
</body>
</html>
