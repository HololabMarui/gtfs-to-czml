<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GTFS-JP Zip確認</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 2rem;
      line-height: 1.6;
      background: #f8fafc;
      color: #0f172a;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dbe2ea;
      border-radius: 12px;
      padding: 1.25rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      margin-bottom: 1rem;
    }
    h1 {
      margin-top: 0;
      font-size: 1.6rem;
    }
    p {
      color: #475569;
    }
    label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.4rem;
      font-weight: 600;
    }
    input[type="file"],
    input[type="date"],
    input[type="text"],
    input[type="number"],
    select {
      display: block;
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      box-sizing: border-box;
    }
    .filename {
      margin-top: 0.6rem;
      font-size: 0.95rem;
      color: #334155;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
    }
    button {
      margin-top: 1.2rem;
      background: #2563eb;
      color: white;
      border: 0;
      border-radius: 10px;
      padding: 0.75rem 1.1rem;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #1d4ed8;
    }
    .note {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: #64748b;
    }
    .checkbox-row {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .checkbox-row label {
      margin: 0;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>GTFS-JP Zip確認</h1>
      <p>
        Step 2 では、GTFS-JP の Zip をアップロードして中身を確認し、
        さらに入力条件から実行予定の Python コマンドを生成して表示します。
      </p>

      <form action="/inspect" method="post" enctype="multipart/form-data">
        <label for="gtfs_zip">GTFS-JP Zipファイル</label>
        <input
          type="file"
          id="gtfs_zip"
          name="gtfs_zip"
          accept=".zip"
          required
        >
        <div class="filename" id="filename">未選択</div>

        <div class="row">
          <div>
            <label for="service_date">service-date</label>
            <input type="date" id="service_date" name="service_date" required>
          </div>
          <div>
            <label for="tz">タイムゾーン</label>
            <input type="text" id="tz" name="tz" value="Asia/Tokyo">
          </div>
        </div>

        <div class="row">
          <div>
            <label for="route_ids">route_id（任意、カンマ区切り）</label>
            <input
              type="text"
              id="route_ids"
              name="route_ids"
              placeholder="例: 1,3,airport-line"
            >
          </div>
          <div>
            <label for="model_url">model-url（任意）</label>
            <input
              type="text"
              id="model_url"
              name="model_url"
              placeholder="例: https://example.com/bus.glb"
            >
          </div>
        </div>

        <div class="row3">
          <div>
            <label for="fallback_mode">fallback-mode</label>
            <select id="fallback_mode" name="fallback_mode">
              <option value="stops" selected>stops</option>
              <option value="none">none</option>
            </select>
          </div>
          <div>
            <label for="sample_every">sample-every (m)</label>
            <input type="number" id="sample_every" name="sample_every" value="50" min="1">
          </div>
          <div>
            <label for="trail">trail (sec)</label>
            <input type="number" id="trail" name="trail" value="60" min="0">
          </div>
        </div>

        <div class="row3">
          <div>
            <label for="marker_color">marker-color</label>
            <input type="text" id="marker_color" name="marker_color" value="#3a8fff">
          </div>
          <div>
            <label for="marker_symbol">marker-symbol</label>
            <input type="text" id="marker_symbol" name="marker_symbol" value="bus">
          </div>
          <div>
            <label for="marker_size">marker-size</label>
            <select id="marker_size" name="marker_size">
              <option value="small">small</option>
              <option value="medium" selected>medium</option>
              <option value="large">large</option>
            </select>
          </div>
        </div>

        <div class="checkbox-row">
          <label><input type="checkbox" name="with_point" checked> with-point</label>
          <label><input type="checkbox" name="clamp_to_ground" checked> clamp-to-ground</label>
          <label><input type="checkbox" name="debug"> debug</label>
        </div>

        <button type="submit">Zip確認とコマンド生成</button>
      </form>

      <div class="note">
        この段階ではまだ変換を実行しません。入力値をもとに実行予定コマンドを表示します。
      </div>
    </div>
  </div>

  <script>
    const fileInput = document.getElementById("gtfs_zip");
    const filename = document.getElementById("filename");

    fileInput.addEventListener("change", () => {
      if (fileInput.files.length > 0) {
        filename.textContent = "選択中: " + fileInput.files[0].name;
      } else {
        filename.textContent = "未選択";
      }
    });
  </script>
</body>
</html>
